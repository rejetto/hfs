openapi: 3.0.1
info:
  title: HFS 3
  description: Browser-facing HTTP API used by the HFS frontend and upload flows.
  version: 1.0.0
tags:
  - name: Front-end
paths:
  /~/api/get_file_list:
    get:
      summary: List files
      deprecated: false
      description: returns all files of a specified folder
      tags:
        - Front-end
      parameters:
        - name: uri
          in: query
          description: path to the folder containing the files. Default is `/`
          required: false
          schema:
            type: string
        - name: offset
          in: query
          description: number of records to skip
          required: false
          schema:
            type: number
        - name: limit
          in: query
          description: max number of records to return
          required: false
          schema:
            type: number
        - name: search
          in: query
          description: search for files with the specified pattern, also in subfolders.
          required: false
          schema:
            type: string
        - name: searchComment
          in: query
          description: search for files by comment, also in subfolders.
          required: false
          schema:
            type: string
        - name: fileMask
          in: query
          description: filter files by name mask.
          required: false
          schema:
            type: string
        - name: wild
          in: query
          description: set to `no` to use plain substring matching instead of wildcard matching.
          required: false
          schema:
            type: string
        - name: c
          in: query
          description: >-
            request separated `c` and `m` properties in entries. Pass any string
            to turn it on. By default only `m` is provided, and when missing it
            is copied from `c`.
          required: false
          schema:
            type: string
        - name: onlyFolders
          in: query
          description: return only folders.
          required: false
          schema:
            type: boolean
        - name: onlyFiles
          in: query
          description: return only files.
          required: false
          schema:
            type: boolean
        - name: admin
          in: query
          description: request the list with admin privileges.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: all files accordingly to the specified parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
      security: []
  /~/api/refresh_session:
    get:
      summary: Refresh session
      deprecated: false
      description: returns the current browser session state
      tags:
        - Front-end
      responses:
        '200':
          description: current session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
      security: []
  /~/api/login:
    post:
      summary: Login
      deprecated: false
      description: clear-text login
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                password:
                  type: string
                allow_session_ip_change:
                  type: boolean
      responses:
        '200':
          description: login succeeded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Session'
                  - type: object
                    properties:
                      redirect:
                        type: string
      security: []
  /~/api/loginSrp1:
    post:
      summary: Login SRP step 1
      deprecated: false
      description: returns the server SRP challenge
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
      responses:
        '200':
          description: SRP challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SrpStep1'
      security: []
  /~/api/loginSrp2:
    post:
      summary: Login SRP step 2
      deprecated: false
      description: finishes SRP login
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - pubKey
                - proof
              properties:
                pubKey:
                  type: string
                proof:
                  type: string
      responses:
        '200':
          description: login succeeded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Session'
                  - type: object
                    required:
                      - proof
                    properties:
                      proof:
                        type: string
      security: []
  /~/api/logout:
    post:
      summary: Logout
      deprecated: false
      description: clears the current session
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      responses:
        '401':
          description: session cleared
      security: []
  /~/api/change_srp:
    post:
      summary: Change password with SRP
      deprecated: false
      description: updates the current account SRP verifier
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - salt
                - verifier
              properties:
                username:
                  type: string
                salt:
                  type: string
                verifier:
                  type: string
      responses:
        '200':
          description: password changed
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/get_notifications:
    get:
      summary: Subscribe to notifications
      deprecated: false
      description: server-sent events channel used by the frontend
      tags:
        - Front-end
      parameters:
        - name: channel
          in: query
          description: notification channel name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: event stream
          content:
            text/event-stream:
              schema:
                type: string
      security: []
  /~/api/get_file_details:
    get:
      summary: File details
      deprecated: false
      description: returns extra metadata for one or more file URIs
      tags:
        - Front-end
      parameters:
        - name: uris
          in: query
          description: file URIs to inspect
          required: true
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: details for the requested URIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDetailsResponse'
      security: []
  /~/api/create_folder:
    post:
      summary: Create folder
      deprecated: false
      description: creates a new folder inside the specified parent
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - uri
                - name
              properties:
                uri:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: folder created
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/rename:
    post:
      summary: Rename entry
      deprecated: false
      description: renames a file or folder
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - uri
                - dest
              properties:
                uri:
                  type: string
                dest:
                  type: string
      responses:
        '200':
          description: rename completed
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/move_files:
    post:
      summary: Move files
      deprecated: false
      description: moves one or more files to another folder
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - uri_from
                - uri_to
              properties:
                uri_from:
                  type: array
                  items:
                    type: string
                uri_to:
                  type: string
      responses:
        '200':
          description: move results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveFilesResponse'
      security: []
  /~/api/copy_files:
    post:
      summary: Copy files
      deprecated: false
      description: copies one or more files to another folder
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - uri_from
                - uri_to
              properties:
                uri_from:
                  type: array
                  items:
                    type: string
                uri_to:
                  type: string
      responses:
        '200':
          description: copy results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveFilesResponse'
      security: []
  /~/api/comment:
    post:
      summary: Set comment
      deprecated: false
      description: stores a comment for a file or folder
      tags:
        - Front-end
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - uri
                - comment
              properties:
                uri:
                  type: string
                comment:
                  type: string
      responses:
        '200':
          description: comment saved
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/get_folder_size:
    get:
      summary: Folder size
      deprecated: false
      description: calculates the total size of a folder
      tags:
        - Front-end
      parameters:
        - name: uri
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: folder size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSize'
      security: []
  /~/api/get_folder_size_partial:
    get:
      summary: Folder size progress
      deprecated: false
      description: returns partial progress for an in-flight folder size computation
      tags:
        - Front-end
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: current partial progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSize'
        '404':
          description: computation not found anymore
      security: []
  /{folder}:
    post:
      summary: Upload
      deprecated: false
      description: Equivalent to curl -F upload=@FILE FOLDER/
      tags:
        - Front-end
      parameters:
        - name: folder
          in: path
          description: The folder path where the file will be uploaded
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                upload:
                  type: string
                  description: The file to upload.
                  format: binary
            encoding:
              upload:
                contentType: application/octet-stream
      responses:
        '200':
          description: file uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultipartUploadResult'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultipartUploadResult'
      security: []
  /~/api/add_account:
    post:
      summary: add account
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                belongs:
                  type: array
                  items:
                    type: string
                ignore_limits:
                  type: boolean
                disable_password_change:
                  type: boolean
                admin:
                  type: boolean
                redirect:
                  type: string
                disabled:
                  type: boolean
                expire: &ref_1
                  $ref: '#/components/schemas/Date'
                days_to_live:
                  type: number
                overwrite:
                  type: boolean
              required:
                - username
            example:
              username: john
              password: betterUseLongPasswords
              overwrite: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: returned because it is normalized
                required:
                  - username
      security: []
  /~/api/get_config:
    get:
      summary: get config
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: only
          in: query
          description: to get only specific keys from the config
          required: false
          schema:
            type: array
            items:
              type: string
        - name: omit
          in: query
          description: to get all but the specified keys from the config
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /{folder}/{file}:
    put:
      summary: Upload
      deprecated: false
      description: Equivalent to curl -T FILE URL/
      tags:
        - Front-end
      parameters:
        - name: folder
          in: path
          description: The folder path where the file will be uploaded
          required: true
          example: ''
          schema:
            type: string
        - name: file
          in: path
          description: The uploaded file name
          required: true
          example: ''
          schema:
            type: string
        - name: existing
          in: query
          description: >-
            Conflict policy when the target file already exists. Use
            `overwrite` to replace the file if the caller also has delete
            permission, or `skip` to fail with conflict when the file exists.
          required: false
          schema:
            type: string
            enum:
              - overwrite
              - skip
        - name: comment
          in: query
          description: Comment to store for the uploaded file
          required: false
          schema:
            type: string
        - name: mtime
          in: query
          description: Last modified time to apply to the uploaded file, in Unix milliseconds
          required: false
          schema:
            type: number
        - name: id
          in: query
          description: Client-generated upload identifier used to correlate retries
          required: false
          schema:
            type: string
        - name: resume
          in: query
          description: >-
            Resume offset for resumable uploads. A trailing `!` asks the server
            to reject the request when a better resume point is available.
          required: false
          schema:
            type: string
        - name: partial
          in: query
          description: >-
            Remaining bytes still to be uploaded after this chunk. Used by split
            and resumable uploads so the server can reserve enough disk space.
          required: false
          schema:
            type: number
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: file uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '204':
          description: partial upload chunk stored without finalizing the file
      security: []
  /~/api/set_account:
    post:
      summary: update account
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                changes: &ref_0
                  $ref: '#/components/schemas/Account'
              required:
                - username
                - changes
            example: ''
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: returned because it is normalized
                required:
                  - username
      security: []
  /~/api/set_config:
    post:
      summary: set config
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                values:
                  type: object
                  properties: {}
                  required:
                    - 01HVXZ10SH9AHVGST5XV79TK5A
                  description: all keys are the defined in config.md file
              required:
                - values
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/del_account:
    post:
      summary: delete account
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: x-hfs-anti-csrf
          in: header
          example: '1'
          schema:
            type: string
            default: '1'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
              required:
                - username
            example: ''
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
      security: []
  /~/api/get_accounts:
    get:
      summary: list accounts
      deprecated: false
      description: ''
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items: *ref_0
                required:
                  - list
      security: []
  /~/api/get_usernames:
    get:
      summary: list usernames
      deprecated: false
      description: ''
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      type: string
                required:
                  - list
      security: []
  /~/api/get_admins:
    get:
      summary: list admins
      deprecated: false
      description: ''
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      type: string
                      description: username
                required:
                  - list
      security: []
  /~/api/get_account:
    get:
      summary: get account
      deprecated: false
      description: you can also call this with POST
      tags: []
      parameters:
        - name: username
          in: query
          description: ''
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: *ref_0
      security: []
components:
  schemas:
    Date:
      type: string
      format: date-time
    Session:
      type: object
      properties:
        username:
          type: string
        expandedUsername:
          type: array
          items:
            type: string
        adminUrl:
          type: string
        canChangePassword:
          type: boolean
        requireChangePassword:
          type: boolean
        exp:
          $ref: '#/components/schemas/Date'
        accountExp:
          $ref: '#/components/schemas/Date'
        redirect:
          type: string
    SrpStep1:
      type: object
      required:
        - salt
        - pubKey
      properties:
        salt:
          type: string
        pubKey:
          type: string
    UploadResult:
      type: object
      required:
        - uri
      properties:
        uri:
          type: string
    MultipartUploadResult:
      type: object
      properties:
        uris:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
    FolderSize:
      type: object
      required:
        - bytes
        - files
        - folders
      properties:
        bytes:
          type: number
        files:
          type: number
        folders:
          type: number
    UploadMeta:
      type: object
      properties:
        username:
          type: string
        ip:
          type: string
    FileDetails:
      type: object
      properties:
        upload:
          $ref: '#/components/schemas/UploadMeta'
    FileDetailsResponse:
      type: object
      required:
        - details
      properties:
        details:
          type: array
          items:
            oneOf:
              - type: boolean
                enum:
                  - false
              - $ref: '#/components/schemas/FileDetails'
    MoveFilesResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            oneOf:
              - type: integer
              - type: string
    Account:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        belongs:
          type: array
          items:
            type: string
        ignore_limits:
          type: boolean
        disable_password_change:
          type: boolean
        admin:
          type: boolean
        redirect:
          type: string
        disabled:
          type: boolean
        expire: *ref_1
        days_to_live:
          type: number
      required:
        - username
    folder_body:
      type: object
      properties:
        file:
          type: string
          description: The file to upload.
          format: binary
    inline_response_200:
      type: object
      properties:
        can_archive:
          type: boolean
          description: if you can download this folder as zip
        can_upload:
          type: boolean
          description: if you can upload in this folder
        can_delete:
          type: boolean
          description: if you can delete items in this folder
        can_comment:
          type: boolean
          description: if you can coment items in this folder
        list:
          type: array
          description: entries from this folder
          items:
            $ref: '#/components/schemas/DirEntry'
    DirEntry:
      required:
        - 'n'
      type: object
      properties:
        'n':
          type: string
          description: name of the entry. Can be a relative path in case you used `search`.
        c:
          type: string
          description: creation time
          format: date-time
        m:
          type: string
          description: modification time
          format: date-time
        s:
          type: number
          description: size, in bytes
        p:
          pattern: '[rR]?[lL]?d?'
          type: string
          description: |
            permissions, only when are different from the parent folder.
            Meaning of each character:
            - r: cannot be downloaded
            - R: can be downloaded only with other credentials
            - l: folder cannot be listed
            - L: folder can be listed only with other credetnials
            - d: can be deleted
        comment:
          type: string
          description: assigned comment
      description: >-
        front-end list item format. Common properties are kept short to optimize
        space.
  securitySchemes: {}
servers: []
